ancestor: null
releases:
  0.1.0:
    modules:
    - description: Get the project badges
      name: badges_info
      namespace: ''
    - description: Get a list of integrations
      name: channels_info
      namespace: ''
    - description: Create, delete, update, and pause checks
      name: checks
      namespace: ''
    - description: Get a list of check flips
      name: checks_flips_info
      namespace: ''
    - description: Get a list of checks
      name: checks_info
      namespace: ''
    - description: Get a list of check pings
      name: checks_pings_info
      namespace: ''
    - description: Signal success, fail, and start events
      name: ping
      namespace: ''
    release_date: '2021-10-24'
  0.1.1:
    changes:
      release_summary: Updating the README.md and switching the integration tests
        to GHAs (https://github.com/ansible-collections/community.healthchecksio/pull/9).
    fragments:
    - 0.1.1.yaml
    release_date: '2021-10-27'
  1.1.1:
    changes:
      breaking_changes:
      - checks - support creating Simple checks. Previously, C(schedule) and C(tz)
        were defaulted which made it impossible to differentiate between Simple and
        Cron checks when creating them. Now, either C(schedule) and C(tz) must be
        provided to create a Cron check, or, C(timeout) must be provided to create
        a Simple check (https://github.com/ansible-collections/community.healthchecksio/issues/16).
      bugfixes:
      - Update the tests so that they only run once (https://github.com/ansible-collections/community.healthchecksio/issues/11).
      - ping - remove C(default="") on required C(uuid) parameter (https://github.com/ansible-collections/community.healthchecksio/issues/19).
      release_summary: Adding support for Simple checks.
    fragments:
    - 11-tests-running-twice.yaml
    - 16-create-simple-checks.yaml
    - 19-remove-default-uuid.yaml
    release_date: '2022-04-06'
  1.2.0:
    changes:
      bugfixes:
      - checks - restore C(grace) parameter to Cron checks (https://github.com/ansible-collections/community.healthchecksio/issues/24).
      minor_changes:
      - ci - adding stable-2.13 to sanity and unit testing (https://github.com/ansible-collections/community.healthchecksio/issues/22).
      release_summary: Restoring the C(grace) parameter to Cron checks and adding
        Ansible 2.13 to sanity and unit testing.
    fragments:
    - 22-ci-sanity-2.13.yaml
    - 24-grace.yaml
    release_date: '2022-05-19'
  1.3.0:
    changes:
      minor_changes:
      - checks - implement idempotency when unique param is used (https://github.com/ansible-collections/community.healthchecksio/issues/28)
      release_summary: Implement idempotency when unique param is used in checks.
    fragments:
    - 29-idempotency.yaml
    release_date: '2023-03-10'
  1.3.1:
    changes:
      bugfixes:
      - checks - channel comparison result was order dependent. Fix now compares channels
        lists as sets (https://github.com/ansible-collections/community.healthchecksio/pull/35).
    fragments:
    - 120-compare-channel-sets-as-equal.yaml
    release_date: '2023-08-03'
  1.3.2:
    changes:
      bugfixes:
      - Replace deprecated ``ansible.module_utils._text`` import with ``ansible.module_utils.common.text.converters`` (https://github.com/ansible-collections/community.healthchecksio/pull/46).
    release_date: '2026-04-18'
  1.4.0:
    changes:
      minor_changes:
      - healthchecksio.checks - Add support for self-hosted Healthchecks.io instances via ``management_api_base_url`` and ``ping_api_base_url`` parameters.
      - healthchecksio.checks - Add ``management_api_token`` (with ``api_key`` alias) and ``ping_api_token`` for separate management/ping token support.
      - healthchecksio.checks - Proper check_mode support (delete/pause report would-be changes instead of silently exiting early).
      - healthchecksio.checks - Add diff_mode support (returns ``before``/``after`` state on create/update).
      - healthchecksio.checks - Fix idempotency comparison to include the ``tags`` field.
    release_date: '2026-04-18'
  1.5.0:
    changes:
      minor_changes:
      - checks_info - Add optional ``name`` filter when listing checks; values sent to the API are URL-encoded.
      bugfixes:
      - checks - Fix idempotency when comparing ``grace`` for Cron checks if the API omits or returns ``null`` for ``grace`` while the module applies a default.
      - checks - Declare ``supports_diff_mode`` in a form compatible with Ansible 2.9.
      - plugins/module_utils - Add legacy metaclass boilerplate for current ``ansible-test sanity`` expectations.
    release_date: '2026-04-19'

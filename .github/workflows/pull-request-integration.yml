name: pull-request-integration

on:
  pull_request_target:
    branches: [ main ]
    types: [ opened, synchronize, reopened ]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:

  integration:
    # Require reviewers for this environment (uses real healthchecks.io API)
    # https://securitylab.github.com/research/github-actions-preventing-pwn-requests/
    environment: integration

    runs-on: ubuntu-latest

    steps:
      - name: Perform testing
        uses: ansible-community/ansible-test-gh-action@release/v1
        with:
          git-checkout-ref: ${{ github.event.pull_request.head.sha }}
          pre-test-cmd: >-
            HEALTHCHECKSIO_API_TOKEN=${{ secrets.HEALTHCHECKSIO_API_TOKEN }}
            ./tests/utils/render.sh
            tests/integration/integration_config.yml.template
            > tests/integration/integration_config.yml
          python-version: 3.9
          target-python-version: 3.8
          testing-type: integration
          test-deps: community.general

  integration_self_hosted:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Start Healthchecks stack
        run: |
          docker compose -f tests/docker/docker-compose.yml up -d db
          docker compose -f tests/docker/docker-compose.yml up -d web

      - name: Wait for Healthchecks to be healthy
        run: |
          for i in $(seq 60); do
            wget -qO- --spider http://127.0.0.1:8000/static/img/favicon.png && echo healthy && break
            sleep 2
          done | tail -1

      - name: Bootstrap API key
        env:
          HC_BASE_URL: http://127.0.0.1:8000
          HC_SUPERUSER_EMAIL: ci@example.com
          HC_SUPERUSER_PASSWORD: ci-password
        run: |
          python3 tests/docker/bootstrap.py --project-name tests-docker --api-key-output /tmp/hc_ci_key.txt

      - name: Render integration config
        run: |
          python3 - <<'PYEOF'
          import os
          with open('/tmp/hc_ci_key.txt') as f:
              api_key = f.read().strip()
          with open('tests/integration/integration_config.yml.template') as f:
              content = f.read()
          content = content.replace(
              '${MANAGEMENT_API_TOKEN:-$HEALTHCHECKSIO_API_TOKEN}',
              api_key
          )
          content = content.replace(
              '${MANAGEMENT_API_BASE_URL:-"https://healthchecks.io/api/v1"}',
              'http://127.0.0.1:8000/api/v1'
          )
          content = content.replace(
              '${PING_API_BASE_URL:-"https://hc-ping.com"}',
              'http://127.0.0.1:8000'
          )
          content = content.replace('${PING_API_TOKEN:-""}', '')
          with open('tests/integration/integration_config.yml', 'w') as f:
              f.write(content)
          PYEOF

      - name: Run integration tests
        uses: ansible-community/ansible-test-gh-action@release/v1
        with:
          git-checkout-ref: ${{ github.event.pull_request.head.sha }}
          pre-test-cmd: echo config already rendered
          python-version: 3.9
          target-python-version: 3.8
          testing-type: integration
          test-deps: community.general

      - name: Teardown
        if: always()
        run: docker compose -f tests/docker/docker-compose.yml down -v

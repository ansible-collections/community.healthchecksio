name: integration

on:
  push:
    branches:
      - ci*
      - main
  schedule:
    - cron: '10 6 * * *'

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:

  integration:
    runs-on: ubuntu-latest

    steps:
      - name: Perform testing
        uses: ansible-community/ansible-test-gh-action@release/v1
        with:
          pre-test-cmd: >-
            HEALTHCHECKSIO_API_TOKEN=${{ secrets.HEALTHCHECKSIO_API_TOKEN }}
            ./tests/utils/render.sh
            tests/integration/integration_config.yml.template
            > tests/integration/integration_config.yml
          python-version: 3.9
          target-python-version: 3.8
          testing-type: integration
          test-deps: community.general

  integration_self_hosted:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start Healthchecks stack
        run: |
          docker compose -f tests/docker/docker-compose.yml up -d db
          docker compose -f tests/docker/docker-compose.yml up -d web

      - name: Wait for Healthchecks to be healthy
        run: |
          echo "Waiting up to 5 minutes for container to be healthy..."
          for i in $(seq 60); do
            wget -qO- --spider http://127.0.0.1:8000/api/v3/status/ && echo "healthy" && break
            echo -n "."
            sleep 5
          done
          echo ""
          echo "=== Container logs ==="
          docker compose -f tests/docker/docker-compose.yml logs web --tail=30 || true
          echo "=== Container inspect ==="
          docker compose -f tests/docker/docker-compose.yml ps || true

      - name: Bootstrap API key
        env:
          HC_BASE_URL: http://127.0.0.1:8000
          HC_SUPERUSER_EMAIL: ci@example.com
          HC_SUPERUSER_PASSWORD: ci-password
        run: |
          python3 tests/docker/bootstrap.py --project-name tests-docker --api-key-output /tmp/hc_ci_key.txt

      - name: Run integration tests
        uses: ansible-community/ansible-test-gh-action@release/v1
        with:
          pre-test-cmd: python3 tests/docker/render_integration_config.py
          python-version: 3.9
          target-python-version: 3.8
          testing-type: integration
          test-deps: community.general

      - name: Dump self-hosted container logs on failure
        if: failure()
        run: |
          docker compose -f tests/docker/docker-compose.yml ps || true
          docker compose -f tests/docker/docker-compose.yml logs --tail=300 db web || true

      - name: Teardown
        if: always()
        run: docker compose -f tests/docker/docker-compose.yml down -v